name: Weekly Vendor Open PO Report

on:
  workflow_dispatch:
    inputs:
      test_to:
        description: "Override ALL recipients with this email (leave blank for real vendor emails)"
        required: false
        type: string
        default: ""
      vendor_filter:
        description: "Optional: limit to a single vendor name (e.g. ClearChem)"
        required: false
        type: string
        default: ""
  # schedule:
  #   - cron: "15 15 * * 1"   # 15:15 UTC Monday = 8:15 AM PDT

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run vendor PO report
        env:
          VTIGER_USER: ${{ secrets.VTIGER_USER }}
          VTIGER_ACCESS_KEY: ${{ secrets.VTIGER_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.test_to }}" ]; then
            ARGS="$ARGS --test-to ${{ inputs.test_to }}"
          fi
          if [ -n "${{ inputs.vendor_filter }}" ]; then
            ARGS="$ARGS --vendor \"${{ inputs.vendor_filter }}\""
          fi
          echo "Running: python3 vendor_po_report.py $ARGS"
          eval "python3 vendor_po_report.py $ARGS"
